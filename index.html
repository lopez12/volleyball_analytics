<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volleyball Analytics Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <div class="input-section">
        <h2>🏐 Analítica de Voleibol</h2>
        <p>Pega el log del partido (Ej: <code>7S# 10R! 2E+ 7A-</code>):</p>
        <textarea id="matchLog" placeholder="Pega aquí la secuencia..."></textarea>
        <div class="btn-group" style="margin-bottom:10px;">
            <button onclick="generateReport()" class="btn-primary">📊 Generar Reporte</button>
            <button onclick="importFromGithub()" class="btn-primary" type="button">🌐 Importar Guardados</button>
            <select id="githubFileSelect" style="display:none; margin-left:10px;"></select>
        </div>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="report-header">
            <h1>Reporte de Partido</h1>
            <p id="reportDate">Fecha: --/--/----</p>
            <div id="youtubeLinks" class="youtube-banner" style="display:none;">
                <div class="youtube-banner__label">
                    <svg class="youtube-banner__icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M23.5 6.2s-.2-1.6-.9-2.3c-.9-.9-1.9-.9-2.3-1C17.4 2.7 12 2.7 12 2.7s-5.4 0-8.3.2c-.4.1-1.4.1-2.3 1C.7 4.6.5 6.2.5 6.2S.3 8 .3 9.9v1.7c0 1.8.2 3.7.2 3.7s.2 1.6.9 2.3c.9.9 2 .9 2.5 1C5.5 18.8 12 18.8 12 18.8s5.4 0 8.3-.2c.4-.1 1.4-.1 2.3-1 .7-.7.9-2.3.9-2.3s.2-1.8.2-3.7V9.9c0-1.8-.2-3.7-.2-3.7zM9.7 14.3V8.5l6.2 2.9-6.2 2.9z"/>
                    </svg>
                    <span>Ver partido</span>
                </div>
                <div class="youtube-banner__links" id="youtubeLinksList"></div>
            </div>
        </div>

        <h3 class="section-title">Resumen Global</h3>
        <div class="general-stats">
            <div class="stat-card">
                <div class="stat-value" id="teamRating">0.0</div>
                <div class="stat-label">Rating Equipo</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalActions">0</div>
                <div class="stat-label">Acciones Totales</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="perfectIndex" style="color: var(--success)">0%</div>
                <div class="stat-label">Eficacia Perfecta</div>
            </div>
        </div>
        <h3 class="section-title">Acciones de Equipo</h3>
            <div id="teamActionsGrid" class="players-grid"></div>
        <h3 class="section-title">Detalle por Jugador</h3>
        <div id="playersGrid" class="players-grid"></div>
        
    </div>
</div>

<script src="main.js"></script>

</body>
</html>
